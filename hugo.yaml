  about:
    enable: true
    title: "关于我"
    image: ""
    content: |-
      你好，我是 Kenny（胡健），西南交通大学物流工程硕士，导师张小强。

      教育背景涵盖物流管理本科与物流工程硕士（保研），研究生期间参与多个科研项目，发表学术论文一篇，获授权发明专利一项。具备扎实的运筹优化与数据驱动决策理论功底。

      2024 年暑期在 OPPO 实习，2025 年 7 月正式入职担任备件计划经理（正编 013），核心职责与成果：

      - 负责外销主板备件需求预测、库存管控与供应协调，保障全球服务网络备件供应
      - 主导一加数据系列新品导入的 BOM 确认、首单备货及区域铺货全流程
      - 牵头全球网点自动补货专项推广，通过规则优化与系统落地，将自动补货占比从 75% 提升至 90%+
      - 基于 Knime 搭建自动化数据处理工作流，替代人工报表，显著提升运营效率
      - 基于 SQL 构建数据指标自动分析监控看板，实现关键指标自动预警与可视化

      因个人职业发展规划，选择探索新的行业发展方向。持续学习，保持好奇。
    skills:
      enable: true
      title: "核心能力"
      items:
        - "供应链计划与库存管理"
        - "数据分析：Python、SQL、Knime"
        - "自动化工作流搭建"
        - "项目方案制作与推动"
        - "英语：四级、六级、雅思 7.0"
        - "跨部门协调与沟通"

  experience:
    enable: true
    title: "工作经历"
    items:
      - company: "OPPO"
        companyUrl: ""
        jobs:
          - name: "备件计划经理"
            date: "2025.07 - 2026"
            content: |-
              正式入职 OPPO，担任备件计划经理（职级：正编 013）。经热线、在线、总部服务、线下站点三个月体系化培训后，正式负责以下业务：

              - **外销主板备件计划**：负责海外市场主板类备件的需求预测、安全库存设定与供应计划编排，协调供应商及工厂产能，保障全球服务网络备件供应及时率。
              - **一加数据系列新品导入**：负责新品上市阶段的 BOM 确认、首单备货策略制定及区域铺货计划，确保新品上市与备件供应的同步衔接。
              - **全球网点自动补货专项**：主导自动补货规则的优化设计与系统落地推广，覆盖全球数百个服务网点。通过数据分析定位补货盲区、优化补货参数，自动补货占比从 75% 提升至 90%+。
              - **数据工具支撑**：使用 Knime 搭建自动化数据处理工作流，基于 SQL 构建关键指标自动监控看板，实现异常数据自动预警，显著减少人工介入。

              工作期间各项考核指标达标，主动推动数字化工具在计划业务中的落地应用。因个人职业发展规划，选择离职探索新的行业方向。
            info:
              content: 备件计划经理 | 东莞 OPPO
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-solid fa-chart-line
                  url: ""
                - icon: fa-solid fa-database
                  url: ""

