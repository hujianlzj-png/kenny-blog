baseURL: "https://kenny-blog.pages.dev"
languageCode: "zh-cn"
title: "Kenny - 个人主页"
theme: hugo-profile

defaultContentLanguage: "zh-cn"
defaultContentLanguageInSubdir: false

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 5

markup:
  goldmark:
    renderer:
      unsafe: true

menu:
  main:
    - identifier: blog
      name: 文章
      title: 博客文章
      url: /blogs
      weight: 1

params:
  title: "Kenny - 个人主页"
  description: "数据分析 | 物流工程硕士 | Kenny 的个人博客"
  favicon: "/fav.png"

  useBootstrapCDN: false
  animate: true

  theme:
    defaultTheme: "light"

  color:
    textColor: "#2C3E50"
    secondaryTextColor: "#5D6D7E"
    textLinkColor: "#0D6B6E"
    backgroundColor: "#F8F5F0"
    secondaryBackgroundColor: "#EDE8E0"
    primaryColor: "#0D6B6E"
    secondaryColor: "#FFFFFF"
    darkmode:
      textColor: "#E4E6EB"
      secondaryTextColor: "#B0B3B8"
      textLinkColor: "#5DADE2"
      backgroundColor: "#1A1D23"
      secondaryBackgroundColor: "#242830"
      primaryColor: "#5DADE2"
      secondaryColor: "#2D323B"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.7
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Kenny"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  hero:
    enable: true
    intro: "你好，我是"
    title: "Kenny"
    subtitle: "数据分析 · 物流工程硕士"
    content: "西南交通大学物流工程硕士。曾在 OPPO 担任备件计划经理，参与全球网点自动补货专项、外销主板备件计划及一加数字系列新品导入。擅长数据分析、自动化流程搭建与供应链计划体系优化。"
    image: /images/hero.svg
    bottomImage:
      enable: true
    roundImage: false
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/hujianlzj-png

  about:
    enable: true
    title: "关于我"
    image: ""
    content: |-
      你好，我是 Kenny，西南交通大学物流工程硕士。

      教育背景涵盖物流管理本科与物流工程硕士，研究生期间参与多个科研项目，发表学术论文一篇，获授权发明专利一项。

      2024 年暑期在 OPPO 实习，2025 年 7 月正式入职担任备件计划经理，核心职责与成果：

      - 负责外销主板备件需求预测、库存管控与供应协调
      - 参与一加数字系列新品导入的 BOM 确认、首单备货及区域铺货全流程
      - 参与全球网点自动补货专项推广，将自动补货占比从 75% 提升至 90%+
      - 基于 Knime 搭建自动化数据处理工作流
      - 基于 SQL 构建数据指标自动分析监控看板

      持续学习，保持好奇。
    skills:
      enable: true
      title: "核心能力"
      items:
        - "数据分析：Python、SQL、Knime"
        - "自动化工作流搭建"
        - "供应链计划与库存管理"
        - "项目方案制作与推动"
        - "英语：六级、雅思 7.0"

  experience:
    enable: true
    title: "工作经历"
    items:
      - company: "OPPO"
        jobs:
          - name: "备件计划经理"
            date: "2025.07 - 2026"
            content: |-
              入职 OPPO，担任备件计划经理。经热线、在线、总部服务、线下站点三个月体系化培训后，负责以下业务：

              - 外销主板备件计划：负责海外市场主板类备件的需求预测、安全库存设定与供应计划编排。
              - 一加数字系列新品导入：参与新品上市阶段的 BOM 确认、首单备货策略制定及区域铺货计划。
              - 全球网点自动补货专项：参与自动补货规则的优化设计与系统落地推广，自动补货占比从 75% 提升至 90%+。
              - 数据工具支撑：使用 Knime 搭建自动化数据处理工作流，基于 SQL 构建关键指标自动监控看板。

  education:
    enable: true
    title: "教育背景"
    items:
      - title: "物流工程 硕士"
        school:
          name: "西南交通大学"
          url: "https://www.swjtu.edu.cn"
        date: "2022 - 2025"
        content: |-
          西南交通大学物流工程专业。参与多个科研项目，发表学术论文一篇，申请并获授权发明专利一项。
      - title: "物流管理 本科"
        school:
          name: "西南交通大学"
          url: "https://www.swjtu.edu.cn"
        date: "2018 - 2022"
        content: |-
          本科期间获得国家级竞赛一等奖，多项省级、校级竞赛奖项。系统学习供应链管理、物流系统规划、运筹学等专业课程。

  achievements:
    enable: true
    title: "荣誉与成果"
    items:
      - title: "国家级竞赛一等奖"
        content: "全国大学生物流设计大赛 一等奖"
      - title: "授权发明专利"
        content: "已授权发明专利一项"
      - title: "学术论文"
        content: "发表学术论文一篇"
      - title: "英语能力"
        content: "雅思 7.0 | 英语六级"

  projects:
    enable: true
    title: "项目实践"
    items:
      - title: "全球网点自动补货系统推广"
        image: /images/projects/profile.png
        content: "参与自动补货规则的优化设计与推广，自动补货占比从 75% 提升至 90%+。"
        badges:
          - "供应链计划"
          - "数据分析"
      - title: "Knime 自动化数据处理工作流"
        image: /images/projects/profile.png
        content: "使用 Knime 搭建自动化数据处理流水线，实现数据自动清洗、计算与输出。"
        badges:
          - "Knime"
          - "自动化"
      - title: "SQL 数据指标监控看板"
        image: /images/projects/profile.png
        content: "基于 SQL 构建关键业务指标的自动化分析监控看板，实现异常数据自动预警与可视化展示。"
        badges:
          - "SQL"
          - "数据可视化"

  contact:
    enable: false

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: "最新文章"
      enable: true
    socialNetworks:
      github: https://github.com/hujianlzj-png

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "分钟阅读"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  datesFormat:
    article: "2006-01-02"
    articleList: "2006-01-02"
    articleRecent: "2006-01-02"