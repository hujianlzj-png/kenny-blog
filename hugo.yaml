        content: |-
          保研至西南交通大学物流工程专业，导师张小强教授（研究方向：铁路运营管理、供应链收益管理与优化、生产物流管理）。

          研究生期间参与多个科研项目，发表学术论文一篇，申请并获授权发明专利一项。具备扎实的运筹优化、供应链建模与数据分析能力。
      - title: "物流管理 本科"
