baseURL: "https://kenny-blog.pages.dev"
languageCode: "zh-cn"
title: "Kenny 的博客"
theme: hugo-profile

defaultContentLanguage: "zh-cn"
defaultContentLanguageInSubdir: false

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 5

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  title: "Kenny 的博客"
  description: "Kenny 的个人博客 —— 记录学习、思考与成长"
  favicon: "/fav.png"

  useBootstrapCDN: false
  animate: true

  theme:
    defaultTheme: "dark"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    brandName: "Kenny"
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: true
      disableEducation: true
      disableProjects: true
      disableAchievements: true
      disableContact: false

  hero:
    enable: true
    intro: "你好，我是"
    title: "Kenny"
    subtitle: "供应链计划 · 数据分析 · 持续学习者"
    content: "毕业于西南交通大学物流工程专业，曾在 OPPO 担任备件计划经理，负责全球网点自动补货专项、外销主板备件计划及一加数据系列新品导入。擅长数据分析、自动化流程搭建与项目推动。"
    image: /images/hero.svg
    bottomImage:
      enable: true
    roundImage: false
    button:
      enable: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/hujianlzj-png

  about:
    enable: true
    title: "关于我"
    image: ""
    content: |-
      你好！我是 Kenny（胡健），毕业于西南交通大学，物流管理本科 → 物流工程硕士（保研），导师张小强。研究生期间参与多个项目，发表学术论文一篇，获授权发明专利一项。

      2024 年暑期在 OPPO 实习，2025 年 7 月正式入职 OPPO，担任备件计划经理。工作期间：
      - 负责外销主板备件计划及一加数据系列新品导入
      - 主导全球网点自动补货专项推广，自动补货占比从 75% 提升至 90%+
      - 使用 Knime 搭建自动化数据处理工作流
      - 基于 SQL 构建数据指标自动分析监控看板

      本科期间获得国家级竞赛一等奖、多项省级/校级奖项。英语能力：四级、六级、雅思 7.0。

      因个人职业发展规划，选择探索新的行业方向。持续学习，保持好奇。
    skills:
      enable: true
      title: "常用技能工具："
      items:
        - "Python / 数据分析"
        - "SQL"
        - "Knime"
        - "项目方案制作"
        - "供应链计划"
        - "英语（雅思 7.0）"

  experience:
    enable: false

  education:
    enable: false

  achievements:
    enable: false

  projects:
    enable: false

  contact:
    enable: false

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: "最新文章"
      enable: true
    socialNetworks:
      github: https://github.com/hujianlzj-png

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "分钟阅读"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  datesFormat:
    article: "2006-01-02"
    articleList: "2006-01-02"
    articleRecent: "2006-01-02"