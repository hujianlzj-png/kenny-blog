          本科期间获得国家级竞赛一等奖（全国大学生物流设计大赛），以及多项省级、校级竞赛奖项。

          系统地学习了供应链管理、物流系统规划、运筹学、统计学等专业课程，为后续研究生深造和职业发展奠定了扎实基础。

